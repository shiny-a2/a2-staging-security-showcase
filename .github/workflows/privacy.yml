name: Public privacy gate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  privacy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject sensitive showcase content
        run: python3 scripts/privacy-gate.py

      - name: Test privacy rules
        run: python3 tests/test-privacy-gate.py
